<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./style.css">
  <title>電子フロー</title>
  <link href="https://fonts.googleapis.com/css?family=Zen+Kaku+Gothic+Antique" rel="stylesheet">
</head>

<body>

<div class="head" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-top: 10px;">
  
  <div style="display: flex; align-items: center; flex-shrink: 0; padding-left: 10px; gap: 15px;">
    <label class="selectbox">
      <select id="flow">
        <option value="Aff">肯定側フロー</option>
        <option value="Neg">否定側フロー</option>
      </select>
    </label>
    
    <label class="column-input" style="font-size: 14px;">
      列数: <input type="number" id="columnCount" value="6" min="1" max="12" style="width: 40px;">
      <button id="applyColumnCount">適用</button>
    </label>
  </div>

  <div style="display: flex; align-items: center; flex-grow: 1; padding: 0 30px;">
    <span style="font-weight: bold; margin-right: 10px; font-size: 14px;">論題:</span>
    <div id="motion-text" contenteditable="true" style="border-bottom: 1px solid #ccc; flex-grow: 1; min-height: 24px; padding: 2px 5px; font-size: large;"></div>
  </div>

  <div style="flex-shrink: 0; display: flex; align-items: center;">
    <a href="./description.html" target="_blank" style="font-size: large; margin-right: 15px;">HELP</a>
    <button id="memoBtn" onclick="openMemo()" style="position: static;">📝 メモ</button>
  </div>
  
</div>

  <div id="memoOverlay" onclick="handleOverlayClick(event)">
    <div id="memoPanel">
      <div id="memoPanelHeader">
        <span>メモ</span>
        <button id="memoClose" onclick="closeMemo()">✕</button>
      </div>
      <textarea id="memoText" placeholder="ここにメモを入力..."></textarea>
    </div>
  </div>

  <table id="Aff">
    <thead class="part">
      <tr>
        <th class="red" data-key="aff-col1">肯定側立論<span class="edit-icon">✏️</span></th>
        <th class="blue" data-key="aff-col2">否定側質疑<span class="edit-icon">✏️</span></th>
        <th class="blue" data-key="aff-col3">否定側第一反駁<span class="edit-icon">✏️</span></th>
        <th class="red" data-key="aff-col4">肯定側第一反駁<span class="edit-icon">✏️</span></th>
        <th class="blue" data-key="aff-col5">否定側第二反駁<span class="edit-icon">✏️</span></th>
        <th class="red" data-key="aff-col6">肯定側第二反駁<span class="edit-icon">✏️</span></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="border red" id="0"><div contenteditable="true" class="text"></div></td>
        <td class="border blue" id="1"><div contenteditable="true" class="text"></div></td>
        <td class="border blue" id="2"><div contenteditable="true" class="text"></div></td>
        <td class="border red" id="3"><div contenteditable="true" class="text"></div></td>
        <td class="border blue" id="4"><div contenteditable="true" class="text"></div></td>
        <td class="border red" id="5"><div contenteditable="true" class="text"></div></td>
      </tr>
    </tbody>
  </table>

  <table id="Neg">
    <thead class="part">
      <tr>
        <th class="blue" data-key="neg-col1">否定側立論<span class="edit-icon">✏️</span></th>
        <th class="red" data-key="neg-col2">肯定側質疑<span class="edit-icon">✏️</span></th>
        <th class="red" data-key="neg-col3">肯定側第一反駁<span class="edit-icon">✏️</span></th>
        <th class="blue" data-key="neg-col4">否定側第二反駁<span class="edit-icon">✏️</span></th>
        <th class="red" data-key="neg-col5">肯定側第二反駁<span class="edit-icon">✏️</span></th>
        <th data-key="neg-col6">voter<span class="edit-icon">✏️</span></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="border blue" id="0"><div contenteditable="true" class="text"></div></td>
        <td class="border red" id="1"><div contenteditable="true" class="text"></div></td>
        <td class="border red" id="2"><div contenteditable="true" class="text"></div></td>
        <td class="border blue" id="3"><div contenteditable="true" class="text"></div></td>
        <td class="border red" id="4"><div contenteditable="true" class="text"></div></td>
        <td class="border" id="5"><div contenteditable="true" class="text"></div></td>
      </tr>
    </tbody>
  </table>

  <script src="./script.js"></script>
</body>
</html>
